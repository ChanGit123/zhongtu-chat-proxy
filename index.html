<body>
    <button class="chat-float-btn" onclick="toggleChat()"></button>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="bot-avatar"></div>
            <div class="info"><div class="name">众图科技AI客服</div><div class="status">● 在线</div></div>
            <button class="close-btn" onclick="toggleChat()">×</button>
        </div>
        <div class="messages" id="messages">
            <div class="message bot"><div class="message-avatar"></div><div class="message-content">您好！我是众图科技AI客服，请问有什么可以帮助您的？</div></div>
        </div>
        <div class="quick-replies">
            <button class="quick-reply" onclick="sendQuickReply('AI结构优化是什么？')">AI结构优化</button>
            <button class="quick-reply" onclick="sendQuickReply('服务流程是怎样的？')">服务流程</button>
            <button class="quick-reply" onclick="sendQuickReply('转人工')">转人工</button>
        </div>
        <button class="transfer-btn" onclick="transferToHuman()">📞 转人工客服</button>
        <div class="input-area">
            <div class="input-wrapper"><input type="text" id="userInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)"></div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    </div>
    <script>
        // ⚠️ 部署后替换为您的 Vercel 域名，例如：https://zhongtu-chat-proxy.vercel.app
        const API_BASE = window.location.origin;

        let isLoading = false;
        let sessionId = 'session_' + Date.now();
        let chatOpen = false;

        function toggleChat() { 
            chatOpen = !chatOpen; 
            document.getElementById('chatWindow').classList.toggle('open', chatOpen); 
        }

        function scrollToBottom() { 
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; 
        }

        function addMessage(role, content) { 
            const div = document.createElement('div'); 
            div.className = 'message ' + role; 
            div.innerHTML = '<div class="message-avatar"></div><div class="message-content">' + escapeHtml(content) + '</div>'; 
            document.getElementById('messages').appendChild(div); 
            scrollToBottom(); 
        }

        function showTyping() { 
            const div = document.createElement('div'); 
            div.className = 'message bot'; 
            div.id = 'typingIndicator'; 
            div.innerHTML = '<div class="message-avatar"></div><div class="message-content"><div class="typing-dots"><span></span><span></span><span></span></div></div>'; 
            document.getElementById('messages').appendChild(div); 
            scrollToBottom(); 
        }

        function hideTyping() { 
            const t = document.getElementById('typingIndicator'); 
            if (t) t.remove(); 
        }

        function escapeHtml(t) { 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }

        function transferToHuman() { 
            window.open('https://work.weixin.qq.com/kfid/kfc3eb83029ad298808', '_blank'); 
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            input.value = '';
            document.getElementById('sendBtn').disabled = true;

            addMessage('user', msg);
            showTyping();

            try {
                const response = await fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: msg,
                        type: 'query',
                        role: 'user',
                        session_id: sessionId
                    })
                });

                if (!response.ok) throw new Error('请求失败');

                hideTyping();
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let botMsg = '';

                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerHTML = '<div class="message-avatar"></div><div class="message-content"></div>';
                document.getElementById('messages').appendChild(botDiv);
                const contentDiv = botDiv.querySelector('.message-content');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    for (const line of chunk.split('\n')) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'answer' && data.content?.answer) {
                                    botMsg += data.content.answer;
                                    contentDiv.textContent = botMsg;
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }

                if (!botMsg) contentDiv.textContent = '抱歉，服务暂时不可用，请稍后再试。';

            } catch (e) { 
                console.error('Error:', e);
                hideTyping(); 
                addMessage('bot', '网络连接失败，请稍后再试。'); 
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            scrollToBottom();
        }

        function sendQuickReply(m) { 
            document.getElementById('userInput').value = m; 
            sendMessage(); 
        }

        function handleKeyPress(e) { 
            if (e.key === 'Enter') sendMessage(); 
        }

        document.getElementById('userInput').focus();
    </script>
</body>
</html>
